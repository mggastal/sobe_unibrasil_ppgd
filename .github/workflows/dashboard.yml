name: Atualizar Dashboard UniBrasil

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 Brasília
  workflow_dispatch:        # permite rodar manualmente pela aba Actions

concurrency:
  group: dashboard-unibrasil
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas openpyxl requests
      - run: python dashboard.py
      - name: Commit e push (sempre commita p/ redisparar o Pages)
        run: |
          date -u +"build %Y-%m-%d %H:%M:%SZ" > .last_build
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json .last_build
          git commit -m "Dashboard UniBrasil atualizado $(date +'%d/%m/%Y %H:%M')"
          git push
